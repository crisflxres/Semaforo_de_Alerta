<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Materias</title>
    <link rel="stylesheet" href="../css/horarios_materias.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-btn" id="btnHamburguesa">☰</div>
        <div class="logo-container">
            <img src="../html/Logo-cecyteh.png" class="logo" alt="Logo">
        </div>
        <div class="user-avatar">A</div>
    </header>

    <nav class="tabs-container">
        <div class="tabs">
            <a href="horarios.html" class="tab-item">📅 Horarios</a>
            <a href="horarios_grupos.html" class="tab-item">👥 Grupos</a>
            <a href="horarios_docentes.html" class="tab-item">👤 Docentes</a>
            <a href="horarios_materias.html" class="tab-item active">📖 Materias</a>
            <a href="horarios_aulas.html" class="tab-item">🚪 Aulas</a>
        </div>
    </nav>

    <main class="contenedor-grupos">
        <h2>Gestión de Materias</h2>

        <div class="header-grupos">
            <input type="text" class="input-buscar" placeholder="🔍 Buscar">
            <button class="btn-nuevo">+ Nueva materia</button>
        </div>

        <p class="subtitulo">Materias Registradas</p>

        <!-- Layout de dos columnas: tarjetas a la izquierda, panel a la derecha -->
        <div class="main-layout">

            <!-- Columna izquierda: cuadrícula de tarjetas + paginación -->
            <div class="materias-container">
                <div class="grid-tarjetas" id="contenedorTarjetas"></div>
                <div class="contenedor-paginacion" id="paginacion"></div>
            </div>

            <!-- Columna derecha: panel de registro (oculto por defecto) -->
            <div id="panelRegistro" class="hidden">
                <h3>Registro de Materia</h3>
                
                <input type="text" id="inputNombreMateria" placeholder="Nombre">
                <input type="text" id="inputSemestreMateria" placeholder="Semestre">
                <input type="text" id="inputClave_Carrera" placeholder="Clave de Carrera">
                <input type="text" id="inputPeriodo" placeholder="Periodo">
                <input type="text" id="inputTipoMateria" placeholder="Tipo de Materia">

                <input type="hidden" id="indiceEdicion" value="-1">
                <div class="panel-actions">
                    <button id="btnGuardar" class="btn-nuevo">Guardar</button>
                    <button id="btnCancelar" class="btn-cancelar">Cancelar</button>
                </div>
            </div>

        </div>
    </main>

    <!-- Menú lateral flotante -->
    <div class="menu-flotante-overlay" id="sidebarOverlay">
        <div class="btn-cerrar-flotante" id="btnCerrarSidebar">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <nav class="tarjeta-menu-flotante">
            <ul class="lista-menu-flotante">
                <li><a href="inicio.html"><i class="fa-solid fa-house"></i> <span>Inicio</span></a></li>
                <li><a href="alumnos.html"><i class="fa-solid fa-user-group"></i> <span>Alumnos</span></a></li>
                <li><a href="alertas.html"><i class="fa-solid fa-bell"></i> <span>Alertas</span></a></li>
                <li><a href="horarios.html"><i class="fa-solid fa-calendar-days"></i> <span>Horarios de Docentes</span></a></li>
                <li class="opcion-activa-figma"><a href="configuracion.html"><i class="fa-solid fa-gear"></i> <span>Configuración</span></a></li>
            </ul>
        </nav>
    </div>

    <script src="../js/horarios_materias.js"></script>
</body>
</html>
