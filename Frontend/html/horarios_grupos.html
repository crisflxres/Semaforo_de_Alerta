<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Grupos</title>
    <link rel="stylesheet" href="../css/horarios_grupos.css">
    <link rel="stylesheet" href="../css/roles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-btn" id="btnHamburguesa">☰</div>
        <div class="logo-container">
            <img src="../html/Logo-cecyteh.png" class="logo" alt="Logo">
        </div>
        <div class="perfil-usuario" id="contenedorPerfil">
            <div class="user-avatar" id="avatarUsuario">A</div>

            <div class="dropdown-perfil" id="dropdownPerfil">
                <ul class="lista-dropdown-perfil">
                    <li>
                        <a href="perfil.html">
                            <i class="fa-solid fa-user"></i>
                            <span>Ver perfil</span>
                        </a>
                    </li>
                    <li class="divisor-dropdown"></li>
                    <li>
                        <a href="index.html" id="btnCerrarSesion">
                            <i class="fa-solid fa-right-from-bracket"></i>
                            <span>Cerrar sesión</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <nav class="tabs-container">
        <div class="tabs">
            <a href="horarios.html" class="tab-item">📅 Horarios</a>
            <a href="horarios_grupos.html" class="tab-item active">👥 Grupos</a>
            <a href="horarios_docentes.html" class="tab-item">👤 Docentes</a>
            <a href="horarios_materias.html" class="tab-item">📖 Materias</a>
            <a href="horarios_aulas.html" class="tab-item">🚪 Aulas</a>
        </div>
    </nav>

    <main class="contenedor-grupos">
        <h2>Gestión de Grupos</h2>

        <div class="header-grupos">
            <input type="text" class="input-buscar" placeholder="🔍 Buscar">
            <button class="btn-nuevo">+ Nuevo grupo</button>
        </div>

        <p class="subtitulo">Grupos Registrados</p>

        <!-- Layout dos columnas: tarjetas izquierda, panel derecha -->
        <div class="main-layout">

            <div class="grupos-container">
                <div class="grid-tarjetas" id="contenedorTarjetas"></div>
                <div class="contenedor-paginacion" id="paginacion"></div>
            </div>

            <!-- Panel oculto por defecto, aparece al presionar + Nuevo grupo o Editar -->
            <div id="panelRegistro" class="hidden">
                <h3>Registro de Grupo</h3>
                <input type="text" id="inputNombreGrupo" placeholder="Nombre del grupo">
                <input type="number" id="inputAlumnos" placeholder="Número de alumnos">
                <input type="text" id="inputTurno" placeholder="Turno (Matutino / Vespertino)">
                <input type="hidden" id="indiceEdicion" value="-1">
                <div class="panel-actions">
                    <button id="btnGuardar" class="btn-nuevo">Guardar</button>
                    <button id="btnCancelar" class="btn-cancelar">Cancelar</button>
                </div>
            </div>

        </div>
    </main>

    <div class="menu-flotante-overlay" id="sidebarOverlay">
        <div class="btn-cerrar-flotante" id="btnCerrarSidebar">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <nav class="tarjeta-menu-flotante">
            <ul class="lista-menu-flotante">
                <li><a href="inicio.html"><i class="fa-solid fa-house"></i> <span>Inicio</span></a></li>
                <li><a href="alumnos.html"><i class="fa-solid fa-user-group"></i> <span>Alumnos</span></a></li>
                <li><a href="alertas.html"><i class="fa-solid fa-bell"></i> <span>Alertas</span></a></li>
                <li  class="opcion-activa-figma"><a href="horarios.html"><i class="fa-solid fa-calendar-days"></i> <span>Horarios de Docentes</span></a></li>
                <li><a href="configuracion.html"><i class="fa-solid fa-gear"></i> <span>Configuración</span></a></li>
            </ul>
        </nav>
    </div>
    <script src="../js/interceptor.js"></script>
    <script src="../js/horarios_grupos.js"></script>
    <script src="../js/menu-roles.js"></script>
</body>
</html>
