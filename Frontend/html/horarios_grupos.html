    <header class="main-header">

    <main class="contenedor-grupos">

            <div class="tarjeta-grupo">
                <div class="icono-grupo"><i class="fa-solid fa-table-cells-large"></i></div>

                    <p>30 Alumnos</p>
                    <span class="etiqueta">Matutino</span>

            </div>
            </div>

        <div class="paginador">
            <button>&lt;</button> 
            <button class="active">1</button> 
            <button>2</button> 
            <button>3</button> 
            <button>&gt;</button>

                <li><a href="horarios.html"><i class="fa-solid fa-calendar-days"></i> <span>Horarios de Docentes</span></a></li>
                <li class="opcion-activa-figma"><a href="configuracion.html"><i class="fa-solid fa-gear"></i> <span>Configuración</span></a></li>
            </ul>
        </nav>

    <div class="tarjeta-grupo seleccionada">

</div>

<div class="tarjeta-grupo">

        <h3>Grupo 2</h3>
        <p>30 Alumnos</p>
