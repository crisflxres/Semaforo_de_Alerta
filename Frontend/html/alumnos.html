<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CECYTE - Control de Alumnos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/alumnos.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-btn" id="btnHamburguesa">☰</div>
        <div class="logo-container">
            <img src="../html/Logo-cecyteh.png" class="logo" alt="Logo CECYTE">
        </div>
        <div class="user-avatar">A</div>
    </header>

    <main class="container">
        
        <section class="header-section">
            <div class="title-area">
                <h1>Alumnos</h1>
                <p>Consulta y administración de alumnos</p>
            </div>
            <button class="btn-reporte">Generar Reporte</button>
        </section>

        <!-- Métricas con barras dinámicas integradas -->
        <section class="metrics-grid">
            <div class="metric-card total">
                <div class="icon-circle"><i class="fa-solid fa-users"></i></div>
                <div class="metric-info">
                    <h3 id="count-total">0</h3><p>Total de alumnos</p>
                </div>
                <div class="progress-bar-bg"><div id="bar-total" class="progress-bar-fill" style="width: 100%;"></div></div>
            </div>
            <div class="metric-card regulares">
                <div class="icon-circle"><i class="fa-solid fa-circle-check"></i></div>
                <div class="metric-info">
                    <h3 id="count-regulares">0</h3><p>Alumnos regulares</p>
                </div>
                <div class="progress-bar-bg"><div id="bar-regulares" class="progress-bar-fill" style="width: 0%;"></div></div>
            </div>
            <div class="metric-card riesgo">
                <div class="icon-circle"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="metric-info">
                    <h3 id="count-riesgo">0</h3><p>En riesgo</p>
                </div>
                <div class="progress-bar-bg"><div id="bar-riesgo" class="progress-bar-fill" style="width: 0%;"></div></div>
            </div>
            <div class="metric-card criticos">
                <div class="icon-circle"><i class="fa-solid fa-circle-xmark"></i></div>
                <div class="metric-info">
                    <h3 id="count-criticos">0</h3><p>Críticos</p>
                </div>
                <div class="progress-bar-bg"><div id="bar-criticos" class="progress-bar-fill" style="width: 0%;"></div></div>
            </div>
        </section>

        <section class="filters-panel">
            <div class="search-row">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search-input" placeholder="Buscar Alumno">
                </div>
                <button class="btn-limpiar">Limpiar filtros</button>
            </div>
            <div class="selects-row">
                <div class="filter-group"><label>Grupo</label><select class="filter-select"><option>Todos</option></select></div>
                <div class="filter-group"><label>Carrera</label><select class="filter-select"><option>Todos</option></select></div>
                <div class="filter-group"><label>Semestre</label><select class="filter-select"><option>Todos</option></select></div>
                <div class="filter-group"><label>Turno</label><select class="filter-select"><option>Todos</option></select></div>
                <div class="filter-group"><label>Estado de Alerta</label><select class="filter-select"><option>Todos</option></select></div>
            </div>
        </section>

        <section class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Foto</th><th>Matrícula</th><th>Nombre</th><th>Apellidos</th>
                        <th>Grupo</th><th>Turno</th><th>Semestre</th><th>Carrera</th>
                        <th>PAC</th><th>Estado</th><th>Materias reprobadas</th><th></th>
                    </tr>
                </thead>
                <tbody id="tabla-alumnos-body">
                </tbody>
            </table>
        </section>
    </main>

    <div class="menu-flotante-overlay" id="sidebarOverlay">
        <div class="btn-cerrar-flotante" id="btnCerrarSidebar"><i class="fas fa-times"></i></div>
        <div class="tarjeta-menu-flotante">
            <ul class="lista-menu-flotante">
                <li><a href="inicio.html"><i class="fas fa-home"></i> <span>Inicio</span></a></li>
                <li><a href="alumnos.html"><i class="fas fa-users"></i> <span>Alumnos</span></a></li>
                <li><a href="alertas.html"><i class="fas fa-bell"></i> <span>Alertas</span></a></li>
                <li><a href="horarios.html"><i class="fas fa-calendar-alt"></i> <span>Horarios de Docentes</span></a></li>
                <li class="opcion-activa-figma"><a href="configuracion.html"><i class="fas fa-cog"></i> <span>Configuración</span></a></li>
            </ul>
        </div>
    </div>

    <script src="../js/alumnos.js"></script>
</body>
</html>
