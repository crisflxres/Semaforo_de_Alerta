<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Contraseña · Semáforo de Alerta Académica</title>
<link rel="stylesheet" href="../css/recuperar_password.css">
</head>
<body>

  <div class="topbar">
    <div class="logo-mark">
      <img src="Logo-cecyteh.png" alt="CECyTE Hidalgo" style="height:34px;">
    </div>
    <div class="divider-v"></div>
    <div class="logo-sep">
      <img src="Logo-SEP.png" alt="SEP Educación" style="height:34px;">
    </div>
    <div class="institution-title">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</div>
  </div>
  <div class="goldbar"></div>

  <div class="stage">
    <div class="diamond tl"></div>
    <div class="diamond bl"></div>
    <div class="diamond-pattern"></div>
    <div class="dots top-left">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="dots bottom-right">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="line-accent one"></div>
    <div class="line-accent two"></div>

    <div class="content-grid">
      <div class="headline">
        <h1>Semáforo de<br>Alerta<br>Académica</h1>
      </div>

      <div class="card">
        <h2>Recuperar Contraseña</h2>
        <p class="desc">Ingrese el correo electrónico asociado a su cuenta para recibir instrucciones de recuperación</p>

        <form id="recoverForm" novalidate>
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="usuario@cecytehidalgo.edu.mx" required>

          <button type="submit" class="btn-send" id="sendBtn">Enviar Enlace</button>

          <div class="msg" id="feedback"></div>
        </form>

        <a href="index.html" class="back-link">&larr; Volver al inicio de sesión</a>
      </div>
    </div>
  </div>

<script src="../js/recuperar_password.js"></script>

</body>
</html>
