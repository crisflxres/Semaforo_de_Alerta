<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horarios</title>
    <link rel="stylesheet" href="../css/horarios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-btn" id="btnHamburguesa">☰</div>
        <div class="logo-container">
            <img src="../html/Logo-cecyteh.png" class="logo" alt="Logo">
        </div>
        <div class="user-avatar">A</div>
    </header>

    <nav class="tabs-container">
        <div class="tabs">
            <a href="horarios.html" class="tab-item active">📅 Horarios</a>
            <a href="horarios_grupos.html" class="tab-item">👥 Grupos</a>
            <a href="horarios_docentes.html" class="tab-item">👤 Docentes</a>
            <a href="horarios_materias.html" class="tab-item">📖 Materias</a>
            <a href="horarios_aulas.html" class="tab-item">🚪 Aulas</a>
        </div>
    </nav>

    <!-- Layout: tabla izquierda + panel derecha -->
    <div class="layout-horarios">

        <!-- Columna izquierda: filtros + tabla -->
        <div class="contenedor-horarios">
            <div class="filtros-container">
                <div class="filtro-item">Docente
                    <select id="filtroDocente"><option value="">...</option></select>
                </div>
                <div class="filtro-item">Grupo
                    <select id="filtroGrupo"><option value="">...</option></select>
                </div>
                <div class="filtro-item">Materias
                    <select id="filtroMateria"><option value="">...</option></select>
                </div>
                <div class="filtro-item">Aulas
                    <select id="filtroAula"><option value="">...</option></select>
                </div>
            </div>

            <main class="grid-horarios" id="gridHorarios">
                <div class="header">Hora</div>
                <div class="header">Lunes</div>
                <div class="header">Martes</div>
                <div class="header">Miércoles</div>
                <div class="header">Jueves</div>
                <div class="header">Viernes</div>
                <!-- Las celdas se generan con JS -->
            </main>
        </div>

        <!-- Columna derecha: panel Nueva Clase (oculto por defecto) -->
        <div id="panelNuevaClase" class="hidden">
            <div class="panel-titulo">NUEVA CLASE</div>
            <div class="panel-seleccion-info" id="panelInfo">Has seleccionado: —</div>
            <div id="listaClasesExistentes"></div>
            <div class="panel-cuerpo">
                <div>
                    <label>Materia</label>
                    <select id="selectMateria">
                        <option value="">Seleccionar...</option>
                    </select>
                </div>
                <div>
                    <label>Docente</label>
                    <select id="selectDocente">
                        <option value="">Seleccionar...</option>
                    </select>
                </div>
                <div>
                    <label>Grupo</label>
                    <select id="selectGrupo">
                        <option value="">Seleccionar...</option>
                    </select>
                </div>
                <div>
                    <label>Aula</label>
                    <select id="selectAula">
                        <option value="">Seleccionar...</option>
                    </select>
                </div>
            </div>
            <div class="panel-acciones">
                <button class="btn-cancelar-panel" id="btnCancelarClase">Cancelar</button>
                <button class="btn-guardar-panel" id="btnGuardarClase">Guardar</button>
            </div>
        </div>

    </div>

    <div id="sideMenu" class="side-menu"></div>
    <div id="panelLateral" class="panel-lateral"></div>

    <div class="menu-flotante-overlay" id="sidebarOverlay">
        <div class="btn-cerrar-flotante" id="btnCerrarSidebar">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <nav class="tarjeta-menu-flotante">
            <ul class="lista-menu-flotante">
                <li><a href="inicio.html"><i class="fa-solid fa-house"></i> <span>Inicio</span></a></li>
                <li><a href="alumnos.html"><i class="fa-solid fa-user-group"></i> <span>Alumnos</span></a></li>
                <li><a href="alertas.html"><i class="fa-solid fa-bell"></i> <span>Alertas</span></a></li>
                <li><a href="horarios.html"><i class="fa-solid fa-calendar-days"></i> <span>Horarios de Docentes</span></a></li>
                <li class="opcion-activa-figma"><a href="configuracion.html"><i class="fa-solid fa-gear"></i> <span>Configuración</span></a></li>
            </ul>
        </nav>
    </div>

    <script src="../js/horarios.js"></script>
</body>
</html>
