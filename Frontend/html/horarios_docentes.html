<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Docentes</title>
    <link rel="stylesheet" href="../css/horarios_docentes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- HEADER IGUAL QUE AULAS -->
    <header class="main-header">
        <div class="menu-btn" id="btnHamburguesa">☰</div>
        <div class="logo-container">
            <img src="../html/Logo-cecyteh.png" class="logo" alt="Logo">
        </div>
        <div class="user-avatar">A</div>
    </header>

    <!-- PESTAÑAS IGUAL QUE AULAS -->
    <nav class="tabs-container">
        <div class="tabs">
            <a href="horarios.html" class="tab-item">📅 Horarios</a>
            <a href="horarios_grupos.html" class="tab-item">👥 Grupos</a>
            <a href="horarios_docentes.html" class="tab-item active">👤 Docentes</a>
            <a href="horarios_materias.html" class="tab-item">📖 Materias</a>
            <a href="horarios_aulas.html" class="tab-item">🚪 Aulas</a>
        </div>
    </nav>

    <!-- TODO LO DE ABAJO SIN CAMBIOS -->
    <main class="container">
        <section class="controls">
            <input type="text" id="buscador" placeholder="Buscar docente..." class="search-bar">
            <button class="btn-primary" id="btnNuevoDocente">+ Nuevo docente</button>
        </section>

        <div class="main-layout">
            <div class="left-side">
                <div id="listaDocentes"></div>
                <div id="paginacion"></div>
            </div>

            <div id="panelRegistro" class="hidden">
                <h3>Registro</h3>
                <input type="text" id="inputNombre" placeholder="Nombre completo">
                <input type="email" id="inputEmail" placeholder="Correo electrónico">
                <input type="text" id="inputTelefono" placeholder="Número de teléfono">
                <select id="inputRol">
                    <option value="2">Docente</option>
                    <option value="3">Tutor</option>
                </select>
                <input type="hidden" id="indiceEdicion" value="-1">
                <div class="panel-actions">
                    <button id="btnGuardar" class="btn-primary">Guardar</button>
                    <button id="btnCancelar" class="btn-secondary">Cancelar</button>
                </div>
            </div>
        </div>
    </main>

    <div id="sideMenu" class="side-menu">...</div>
    <div id="panelLateral" class="panel-lateral">...</div>

    <!-- MENÚ FLOTANTE IGUAL QUE AULAS -->
    <div class="menu-flotante-overlay" id="sidebarOverlay">
        <div class="btn-cerrar-flotante" id="btnCerrarSidebar">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <nav class="tarjeta-menu-flotante">
            <ul class="lista-menu-flotante">
                <li><a href="inicio.html"><i class="fa-solid fa-house"></i> <span>Inicio</span></a></li>
                <li><a href="alumnos.html"><i class="fa-solid fa-user-group"></i> <span>Alumnos</span></a></li>
                <li><a href="alertas.html"><i class="fa-solid fa-bell"></i> <span>Alertas</span></a></li>
                <li class="opcion-activa-figma"><a href="horarios.html"><i class="fa-solid fa-calendar-days"></i> <span>Horarios de Docentes</span></a></li>
                <li><a href="configuracion.html"><i class="fa-solid fa-gear"></i> <span>Configuración</span></a></li>
            </ul>
        </nav>
    </div>

    <script src="../js/horarios_docentes.js"></script>
