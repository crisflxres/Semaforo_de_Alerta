    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Semáforo de Alerta Académica - CECyTE</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <main class="contenedor">
            <section class="izquierda">
                <div class="contenido-izquierda">
                    <img src="img/Logo.png" alt="Logo CECyTE" class="logo">
                    <h1 class="titulo-escuela">
                        Colegio de Estudios Científicos y Tecnológicos <br> del Estado de Hidalgo
                    </h1>
                </div>  
            </section>

            <section class="derecha">
                <div class="card-login">
                    <img src="img/Logo.png" alt="Logo CECyTE" class="logo-movil">
                    <p class="titulo-escuela-movil">Colegio de Estudios Científicos y Tecnológicos <br> del Estado de Hidalgo</p>
                    <h2 class="titulo-semaforo">Semáforo de Alerta Académica</h2>
                    <p class="subtitulo">Iniciar Sesión</p>

                    <form class="formulario" id="formLogin">
                        <div class="input-group">
                            <label for="correo" class="sr-only">Correo Electronico</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-regular fa-envelope icon-form"></i>
                                <input type="email" id="correo" placeholder="Correo Electrónico" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="password" class="sr-only">Contraseña</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-solid fa-lock icon-form"></i>
                                <input type="password" id="password" placeholder="Contraseña" required>
                            </div>
                        </div>
                        
                        <a href="recuperar.html" class="olvido-pass">¿Olvidaste tu contraseña?</a>

                        <button type="submit" class="btn btn-azul">Iniciar Sesión</button>
                        <button type="button" class="btn btn-blanco" id="btnIrRegistro">Crear Cuenta</button>
                    </form>
                </div>
            </section>
        </main>
        <script src="login.js"></script>
    </body>
    </html>
